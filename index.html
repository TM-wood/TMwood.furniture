<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Furniture Brand</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f5f5f5; }
    header { background:#111; color:white; padding:20px; text-align:center; }
    nav a { color:white; margin:0 10px; text-decoration:none; }
    .hero { padding:60px 20px; text-align:center; background:#ddd; }
    .section { padding:40px 20px; max-width:1000px; margin:auto; }
    .gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; }
    .gallery img { width:100%; border-radius:10px; }
    .quote-box { background:white; padding:20px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    input, textarea { width:100%; padding:10px; margin:10px 0; }
    button { padding:10px 20px; background:#111; color:white; border:none; cursor:pointer; }
    footer { text-align:center; padding:20px; background:#111; color:white; }
  </style>
</head>
<body>

<header>
  <h1>YOUR LOGO</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#quote">Get Quote</a>
  </nav>
</header>

<div class="hero">
  <h2>Handcrafted Furniture</h2>
  <p>Custom pieces made for your space</p>
</div>

<div class="section" id="gallery">
  <h2>Gallery</h2>
  <div class="gallery">
    <img src="https://via.placeholder.com/300" />
    <img src="https://via.placeholder.com/300" />
    <img src="https://via.placeholder.com/300" />
  </div>
</div>

<div class="section" id="quote">
  <h2>Get a Quote</h2>
  <div class="quote-box">
    <label>What do you need?</label>
    <input id="project" placeholder="Table, bed, cabinet..." />

    <label>Dimensions</label>
    <input id="size" placeholder="e.g. 200x90x75 cm" />

    <label>Material</label>
    <input id="material" placeholder="Oak, pine, etc." />

    <label>Extra details</label>
    <textarea id="details" placeholder="Anything specific..."></textarea>

    <button onclick="submitQuote()">Submit</button>

    <p id="result"></p>
  </div>
</div>

<footer>
  <p>Contact: your@email.com</p>
</footer>

<script>
function submitQuote(){
  const project = document.getElementById('project').value;
  document.getElementById('result').innerText = "Thanks! We'll contact you soon about your " + project + ".";
}
</script>

</body>
</html>
